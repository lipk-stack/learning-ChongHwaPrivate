<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0" />
<meta name="theme-color" content="#e23d3d" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="中华备考" />
<title>中华独中 · 初一备考 (Portable)</title>
<style>
:root{
  --bg:#0f1226; --bg2:#171a35; --card:#1e2245; --card2:#262b54;
  --ink:#f3f5ff; --muted:#a6acd6; --line:#2f3566;
  --brand:#e23d3d; --ok:#34c77b; --bad:#ff5d6c; --gold:#ffd23f;
  --r:18px; --shadow:0 8px 28px rgba(0,0,0,.35);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Roboto,Helvetica,Arial,sans-serif;
  background:linear-gradient(160deg,#0f1226,#141938 60%,#1a1330);
  color:var(--ink);min-height:100vh;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  overscroll-behavior-y:none;
}
#app{max-width:680px;margin:0 auto;padding:14px 16px 40px}
.screen{display:none;animation:fade .25s ease}
.screen.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* HERO */
.hero{background:radial-gradient(120% 120% at 0% 0%,#e23d3d33,transparent),var(--card);
  border:1px solid var(--line);border-radius:24px;padding:20px 18px;box-shadow:var(--shadow)}
.hero-badge{display:inline-block;font-size:13px;color:var(--muted);background:#ffffff10;border:1px solid var(--line);padding:5px 10px;border-radius:999px}
.hero-title{font-size:30px;line-height:1.15;margin:12px 0 4px;font-weight:800}
.hero-title span{color:var(--gold)}
.hero-sub{margin:0;color:var(--muted);font-size:13px}
.streak-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:16px 0 10px}
.stat{background:#ffffff0d;border:1px solid var(--line);border-radius:14px;padding:10px 6px;text-align:center}
.stat-num{display:block;font-size:20px;font-weight:800;color:var(--gold)}
.stat-lbl{display:block;font-size:11px;color:var(--muted);margin-top:2px}
.xp-track{height:10px;background:#00000040;border-radius:999px;overflow:hidden;border:1px solid var(--line)}
.xp-fill{height:100%;width:0;background:linear-gradient(90deg,var(--gold),#ff9d3f);transition:width .5s}
.xp-hint{font-size:12px;color:var(--muted);margin:8px 0 0}

.section-h{font-size:16px;margin:24px 4px 12px;font-weight:700}
.subject-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.subject-card{position:relative;text-align:left;border:1px solid var(--line);border-radius:var(--r);
  padding:16px;background:var(--card);color:var(--ink);cursor:pointer;overflow:hidden;transition:transform .12s}
.subject-card:active{transform:scale(.97)}
.subject-card .ic{font-size:30px}
.subject-card .nm{font-size:18px;font-weight:800;margin-top:8px}
.subject-card .en{font-size:12px;color:var(--muted)}
.subject-card .bl{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.4}
.subject-card .pill{position:absolute;top:12px;right:12px;font-size:11px;background:#00000033;border:1px solid var(--line);padding:3px 8px;border-radius:999px;color:var(--muted)}
.subject-card .pbar{height:6px;background:#00000040;border-radius:999px;margin-top:12px;overflow:hidden}
.subject-card .pbar i{display:block;height:100%;width:0;border-radius:999px}

.mode-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mode-card{font-size:26px;display:flex;flex-direction:column;align-items:center;gap:4px;
  border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:var(--r);padding:16px;cursor:pointer}
.mode-card span{font-size:15px;font-weight:700}
.mode-card small{font-size:11px;color:var(--muted)}
.mode-card:active{transform:scale(.97)}

.foot{color:var(--muted);font-size:11px;text-align:center;margin-top:28px;line-height:1.6}

/* TOPBAR */
.topbar,.quiz-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.topbar span{font-weight:700}
.back{background:#ffffff12;border:1px solid var(--line);color:var(--ink);border-radius:12px;padding:8px 12px;font-size:14px;cursor:pointer}
.subj-head{border-radius:var(--r);padding:18px;color:#fff;box-shadow:var(--shadow)}
.subj-head .big{font-size:24px;font-weight:800}
.subj-head .sm{opacity:.9;font-size:13px;margin-top:4px}
.actions{margin:16px 0;display:flex;gap:10px}
.actions.col{flex-direction:column}
.btn-primary{flex:1;background:linear-gradient(90deg,var(--brand),#ff6a3d);color:#fff;border:none;border-radius:14px;
  padding:14px;font-size:16px;font-weight:800;cursor:pointer;box-shadow:0 6px 18px #e23d3d44}
.btn-primary:active{transform:scale(.98)}
.btn-ghost{background:#ffffff10;border:1px solid var(--line);color:var(--ink);border-radius:14px;padding:13px;font-size:15px;cursor:pointer}

.topic-stats{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.topic-stats .t{font-size:12px;background:var(--card);border:1px solid var(--line);padding:6px 10px;border-radius:999px;color:var(--muted)}
#notes-wrap{margin-top:18px}
.note{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px;margin-bottom:10px}
.note h4{margin:0 0 6px;font-size:14px}
.note p{margin:0;font-size:13px;color:var(--muted);line-height:1.6;white-space:pre-line}

/* QUIZ */
.qprogress{flex:1;height:10px;background:#00000040;border-radius:999px;overflow:hidden;border:1px solid var(--line)}
.qprogress-fill{height:100%;width:0;background:linear-gradient(90deg,var(--ok),#7ef0b0);transition:width .35s}
.qcount{font-size:13px;color:var(--muted);min-width:46px;text-align:right}
.qbody{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:18px;box-shadow:var(--shadow)}
.qmeta{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.chip{font-size:12px;font-weight:700;padding:4px 10px;border-radius:999px;background:#ffffff14;border:1px solid var(--line)}
.chip.ghost{color:var(--muted);font-weight:500}
.q-stem{font-size:19px;line-height:1.6;font-weight:600;white-space:pre-line}
.q-options{margin-top:16px;display:flex;flex-direction:column;gap:10px}
.opt{display:flex;align-items:flex-start;gap:10px;text-align:left;background:var(--card2);border:1.5px solid var(--line);
  border-radius:14px;padding:13px 14px;font-size:16px;color:var(--ink);cursor:pointer;transition:.12s}
.opt:active{transform:scale(.99)}
.opt .lt{font-weight:800;color:var(--muted);min-width:20px}
.opt.correct{border-color:var(--ok);background:#34c77b22}
.opt.correct .lt{color:var(--ok)}
.opt.wrong{border-color:var(--bad);background:#ff5d6c22}
.opt.wrong .lt{color:var(--bad)}
.opt.dim{opacity:.55}
.opt[disabled]{cursor:default}

.q-fill{margin-top:16px;display:flex;gap:10px;flex-direction:column}
.q-fill input{background:var(--card2);border:1.5px solid var(--line);border-radius:14px;padding:14px;font-size:18px;color:var(--ink)}
.q-fill input:focus{outline:none;border-color:var(--brand)}

.q-feedback{margin-top:16px;border-radius:14px;padding:14px;font-size:14px;line-height:1.65;border:1px solid var(--line)}
.q-feedback.ok{background:#34c77b18;border-color:#34c77b66}
.q-feedback.bad{background:#ff5d6c14;border-color:#ff5d6c55}
.q-feedback .ftitle{font-weight:800;font-size:15px;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.q-feedback .ans{color:var(--gold);font-weight:700}
.quiz-foot{margin-top:16px}
.quiz-foot .btn-primary{width:100%}

/* RESULT */
#screen-result{text-align:center;padding-top:30px}
.result-emoji{font-size:72px;animation:pop .5s ease}
@keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.2)}100%{transform:scale(1)}}
#result-title{font-size:26px;margin:8px 0}
.result-score{font-size:44px;font-weight:900;color:var(--gold)}
.result-msg{color:var(--muted);font-size:15px;max-width:420px;margin:8px auto 4px}
.result-xp{font-size:15px;font-weight:700;color:var(--ok);margin:14px 0}
#screen-result .actions{max-width:360px;margin:18px auto}

/* confetti */
#confetti{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:50}
.cf{position:absolute;width:10px;height:14px;top:-20px;border-radius:2px;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:.9}}

@media(min-width:560px){.hero-title{font-size:36px}}

</style>
</head>
<body>

<div id="app">
  <!-- HOME -->
  <section id="screen-home" class="screen active">
    <header class="hero">
      <div class="hero-badge">🏫 吉隆坡中华独立中学</div>
      <h1 class="hero-title">初一新生考试<br/><span>趣味备考 App</span></h1>
      <p class="hero-sub">Chong Hwa Junior 1 Entrance Exam · Fun Prep</p>
      <div class="streak-bar">
        <div class="stat"><span class="stat-num" id="stat-level">1</span><span class="stat-lbl">等级 Lv</span></div>
        <div class="stat"><span class="stat-num" id="stat-xp">0</span><span class="stat-lbl">经验 XP</span></div>
        <div class="stat"><span class="stat-num" id="stat-streak">0</span><span class="stat-lbl">🔥 连胜</span></div>
        <div class="stat"><span class="stat-num" id="stat-acc">–</span><span class="stat-lbl">正确率</span></div>
      </div>
      <div class="xp-track"><div class="xp-fill" id="xp-fill"></div></div>
      <p class="xp-hint" id="xp-hint"></p>
    </header>

    <h2 class="section-h">选择科目 · Choose a Subject</h2>
    <div id="subject-grid" class="subject-grid"></div>

    <h2 class="section-h">挑战模式 · Modes</h2>
    <div class="mode-row">
      <button class="mode-card" data-mode="mixed">🎲<span>综合挑战</span><small>Mixed quiz</small></button>
      <button class="mode-card" data-mode="review">🩹<span>错题重练</span><small>Review mistakes</small></button>
    </div>

    <p class="foot">题目取自《2026 小六历届试题（修订版）》· 答案附详细讲解<br/><span id="foot-meta"></span></p>
  </section>

  <!-- SUBJECT DETAIL -->
  <section id="screen-subject" class="screen">
    <div class="topbar"><button class="back" data-home>‹ 返回</button><span id="subj-title"></span></div>
    <div id="subj-head" class="subj-head"></div>
    <div class="actions">
      <button class="btn-primary" id="start-practice">▶ 开始练习 Practice</button>
    </div>
    <div id="topic-stats" class="topic-stats"></div>
    <div id="notes-wrap"></div>
  </section>

  <!-- QUIZ -->
  <section id="screen-quiz" class="screen">
    <div class="quiz-top">
      <button class="back" id="quit-quiz">✕</button>
      <div class="qprogress"><div class="qprogress-fill" id="qprogress-fill"></div></div>
      <div class="qcount"><span id="q-index">1</span>/<span id="q-total">1</span></div>
    </div>
    <div class="qbody">
      <div class="qmeta"><span id="q-subject" class="chip"></span><span id="q-topic" class="chip ghost"></span></div>
      <div id="q-stem" class="q-stem"></div>
      <div id="q-options" class="q-options"></div>
      <div id="q-fill" class="q-fill" hidden>
        <input id="q-input" type="text" inputmode="text" autocomplete="off" placeholder="输入答案…" />
        <button id="q-submit" class="btn-primary">提交 Submit</button>
      </div>
      <div id="q-feedback" class="q-feedback" hidden></div>
    </div>
    <div class="quiz-foot">
      <button id="q-next" class="btn-primary" hidden>下一题 ›</button>
    </div>
  </section>

  <!-- RESULT -->
  <section id="screen-result" class="screen">
    <div id="result-emoji" class="result-emoji">🎉</div>
    <h2 id="result-title">做得好！</h2>
    <div class="result-score"><span id="result-correct">0</span> / <span id="result-total">0</span></div>
    <p id="result-msg" class="result-msg"></p>
    <div class="result-xp" id="result-xp"></div>
    <div class="actions col">
      <button class="btn-primary" id="result-again">再来一组 ↻</button>
      <button class="btn-ghost" data-home>回首页 Home</button>
    </div>
  </section>
</div>

<div id="confetti"></div>

<script>
/* =====================================================================
   Chong Hwa Independent High School — Junior 1 Entrance Exam
   Question Bank  (吉隆坡中华独立中学 初一新生考试 题库)
   Source: 2026小六历届试题（修订版） — 2026 entrance paper
   Answers verified against the official answer key (where provided) and,
   for the Chinese MCQ section, determined by subject analysis.
   ===================================================================== */
window.QUESTION_BANK = {
  meta: {
    school: "吉隆坡中华独立中学 / Chong Hwa Independent High School, KL",
    exam: "初一新生考试 · Junior 1 Entrance Examination",
    paperYear: 2026,
    builtIteration: 1
  },

  subjects: {
    /* ---------------------------------------------------------------- */
    chinese: {
      key: "chinese",
      name: "华文",
      enName: "Chinese",
      icon: "📖",
      color: "#e23d3d",
      uiLang: "zh",
      blurb: "字词、成语、病句、修辞与文学常识",
      questions: [
        { id:"zh1", topic:"字形辨析", stem:"取得好成绩时，我们应当保持 ____ 怀若谷的态度，继续努力，不可骄傲自满。",
          options:["须","许","虚","绪"], answer:2,
          explanation:"成语是「虚怀若谷」，意思是胸怀像山谷一样宽广深邃，形容十分谦虚。「虚」表示谦虚、空，故选 C。「须」是必须，「许」是允许，「绪」是头绪，都不合此意。" },
        { id:"zh2", topic:"字形辨析", stem:"在学习书法时，即使遇到许多 ____ 折，哲凯也依然每天坚持练习。",
          options:["挫","措","错","蹉"], answer:0,
          explanation:"「挫折」指失败、受阻。「措」用于措施、不知所措；「错」是错误；「蹉」用于蹉跎（虚度光阴）。故选 A。" },
        { id:"zh3", topic:"词语运用", stem:"作为队长，他深知比赛的重要性，所以赛前不敢有丝毫 ____，生怕掉以轻心而影响全队。",
          options:["粗心","松懈","傲慢","质疑"], answer:1,
          explanation:"与「掉以轻心」呼应，强调不敢放松，「松懈」最贴切。故选 B。" },
        { id:"zh4", topic:"成语·字形", stem:"当他看见母亲在站台上等候，脸上写满关切与思念，他不由得 ____ 泪下，紧紧抱住母亲。",
          options:["安然","昂首","盎然","潸然"], answer:3,
          explanation:"「潸（shān）然泪下」形容眼泪不由自主地流下来，符合感动的情境。故选 D。「盎然」指兴味浓厚，「昂首」是抬头。" },
        { id:"zh5", topic:"多音字", stem:"「他喜欢收藏邮票，就像考古学家寻找古代的宝藏一样。」句中两个「藏」的读音依序是：",
          options:["cáng；cáng","cáng；zàng","zàng；cáng","zàng；zàng"], answer:1,
          explanation:"「收藏」的藏读 cáng（收存）；「宝藏」的藏读 zàng（蕴藏的财富）。依序为 cáng；zàng，故选 B。" },
        { id:"zh6", topic:"多音字", stem:"下列哪一组画线字的读音是相同的？",
          options:["重：重量、重视、重新","行：行动、行李、银行","长：成长、长久、时长","倒：跌倒、倒闭、倒塌"], answer:3,
          explanation:"D 组「跌倒、倒闭、倒塌」都读 dǎo，读音相同。A 的「重新」读 chóng；B 的「银行」读 háng；C 的「成长」读 zhǎng。故选 D。" },
        { id:"zh7", topic:"成语运用", stem:"下列哪一项成语在句子中使用不恰当？",
          options:["看到同伴遇到困难，小丽总是挺身而出，乐于助人。","这本书情节扣人心弦，让人一读就停不下来。","在这个项目中，大家各执己见，提出建设性的意见。","经过不断努力，她的画技已达到出神入化的境界。"], answer:2,
          explanation:"「各执己见」指各人坚持自己的意见、互不相让，带贬义，与「提出建设性的意见」的合作语境矛盾。故 C 使用不恰当。" },
        { id:"zh8", topic:"成语·反义", stem:"「他明知前路充满风险，却毫不犹豫地站出来承担责任，展现出奋不顾身的精神。」下列哪项与「奋不顾身」意思相反？",
          options:["畏首畏尾","义无反顾","勇往直前","节节败退"], answer:0,
          explanation:"「奋不顾身」形容勇往直前、不顾安危；其反义是「畏首畏尾」（瞻前顾后、胆小怕事）。B、C 是近义词，D 指接连失败。故选 A。" },
        { id:"zh9", topic:"关联词", stem:"「____ 在学习上遇到困难，____ 在生活中受到打击，他都表现得很乐观。」",
          options:["如果……就","尽管……仍然","无论……还是","虽然……但是"], answer:2,
          explanation:"前后是并列的两种情况，且结果不变，应用表示「条件无论怎样、结果都一样」的「无论……还是」。故选 C。" },
        { id:"zh10", topic:"关联词", stem:"「他常年坚持环保公益活动，____ 风雨再大，____ 从未缺席。」",
          options:["只有……才","哪怕……也","不但……而且","与其……不如"], answer:1,
          explanation:"表示退一步的假设让步关系：即使风雨再大也不缺席，应用「哪怕……也」。故选 B。" },
        { id:"zh11", topic:"谚语", stem:"「老师不直接给答案，而是引导学生自己去探索、思考。」最能体现这种教育理念的谚语是：",
          options:["活到老，学到老","亡羊补牢，犹未为晚","工欲善其事，必先利其器","授人以鱼，不如授人以渔"], answer:3,
          explanation:"「授人以鱼，不如授人以渔」强调教方法比直接给结果更重要，正与「引导学生自己探索」相合。故选 D。" },
        { id:"zh12", topic:"歇后语", stem:"「他表面笑容可掬，背地里却处处陷害别人……这种人简直是 ____。」最适合填入的歇后语是：",
          options:["笑里藏刀——暗中伤人","八仙过海——各显神通","泥菩萨过河——自身难保","赶鸭子上架——勉为其难"], answer:0,
          explanation:"句意是表里不一、暗中害人，「笑里藏刀——暗中伤人」最贴切。故选 A。" },
        { id:"zh13", topic:"错别字", stem:"试选出「没有」错别字的一项：",
          options:["温顺 抱怨 迫不急待","辩论 恳求 一筹莫展","湛蓝 戒备 走头无路","粗造 默契 循规蹈矩"], answer:1,
          explanation:"B 全对。A「迫不急待」应为「迫不及待」；C「走头无路」应为「走投无路」；D「粗造」应为「粗糙」。故选 B。" },
        { id:"zh14", topic:"错别字", stem:"试选出「有」错别字的一项：",
          options:["冒险 胆大妄为 一无是处","羞涩 有条不紊 刻不容援","轻盈 唉声叹气 水滴石穿","艰辛 自作主张 满面春风"], answer:1,
          explanation:"B 的「刻不容援」应为「刻不容缓」（缓：拖延）。其余各项均正确。故选 B。" },
        { id:"zh15", topic:"近义词", stem:"下列哪一组词语的同义词搭配「不正确」？",
          options:["鼓励 = 激励","嘲笑 = 奚落","悠闲 = 安逸","犹豫 = 果断"], answer:3,
          explanation:"「犹豫」是迟疑不决，「果断」是坚决不犹豫，二者意思相反，并非同义词。故选 D。" },
        { id:"zh16", topic:"修辞手法", stem:"「小溪在欢快地歌唱，伴随着我一路前行，好像在为我加油打气。」这句采用了什么修辞手法？",
          options:["比喻","比拟","引用","夸张"], answer:1,
          explanation:"把小溪当作人来写（会「歌唱」「加油打气」），这是把物当人写的「比拟（拟人）」。没有出现喻体相比，不是比喻。故选 B。" },
        { id:"zh17", topic:"修辞手法", stem:"下列哪项修辞手法的判断「不正确」？",
          options:["这本书的内容多得可以装满操场。（夸张）","这点小事，难道还需要妈妈亲自帮你处理吗？（反问）","他实在太疲惫了，甚至连手指都懒得动一下。（比喻）","风呼呼地在窗外怒吼，把门窗吹得咯吱作响。（比拟）"], answer:2,
          explanation:"C 句只是用「连手指都懒得动」来夸张地写疲惫，并没有比喻（没有把一物比作另一物），判断为「比喻」是错误的。故选 C。" },
        { id:"zh20", topic:"句式", stem:"试选出「不是」祈使句的一项：",
          options:["你快把大门关上，以免冷风灌进来。","别忘了带上雨伞，外面快要下雨了！","我昨天在街上遇见好久不见的同学。","请安静下来，老师要宣布重要的事。"], answer:2,
          explanation:"祈使句表示命令、请求、劝阻。C 只是陈述一件事（昨天遇见同学），是陈述句。故选 C。" },
        { id:"zh21", topic:"病句", stem:"下列哪一个句子是「有」语病的？",
          options:["通过这次实地考察，使我增长了不少见识。","无论遇到多大困难，我们都要想办法解决。","新操场宽敞明亮，供同学们举办各类活动。","辩论赛中，双方辩手旗鼓相当，气氛热烈。"], answer:0,
          explanation:"A 句「通过……使……」同时使用，使句子缺少主语（成分残缺）。应删去「通过」或「使」其中之一。故选 A。" },
        { id:"zh22", topic:"病句", stem:"下列哪一个句子是「没有」语病的？",

          explanation:"C 句结构完整、搭配恰当，没有语病。A「暴雨使道路更拥挤」搭配不当；B「完全消失了很多」自相矛盾；D「纷纷……积极」语义重复。故选 C。" },
        { id:"zh23", topic:"文化常识", stem:"下列哪一项「不是」端午节的传统习俗？",

          options:["表妹：称阿姨的女儿","姑妈：称父亲的姐妹","叔叔：称母亲的兄弟","堂哥：称大伯的儿子"], answer:2,

<script>
/* Chong Hwa Junior 1 Entrance Exam — prep app logic */
(function () {
  "use strict";
  const BANK = window.QUESTION_BANK;
  const SUBJECTS = BANK.subjects;
  const LETTERS = ["A", "B", "C", "D", "E"];
  const STORE_KEY = "chonghwa_prep_v1";

  /* ---------- persistent state ---------- */
  const state = load();
  function load() {
    try {
      const s = JSON.parse(localStorage.getItem(STORE_KEY));
      if (s && s.seen) return s;
    } catch (e) {}
    return { xp: 0, streak: 0, bestStreak: 0, seen: {}, correct: {}, wrong: {}, totalAns: 0, totalCorrect: 0 };
  }
  function save() { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }

  /* ---------- helpers ---------- */
  const $ = (s) => document.querySelector(s);
  const el = (s) => document.getElementById(s);
  function allQuestions() {
    const out = [];
    Object.values(SUBJECTS).forEach((s) => s.questions.forEach((q) => out.push(Object.assign({ _subj: s.key }, q))));
    return out;
  }
  function shuffle(a) { a = a.slice(); for (let i = a.length - 1; i > 0; i--) { const j = (Math.random() * (i + 1)) | 0;[a[i], a[j]] = [a[j], a[i]]; } return a; }
  function levelFromXp(xp) { return Math.floor(xp / 100) + 1; }
  function normalize(s) {
    return String(s).trim().toLowerCase()
      .replace(/\s+/g, "")
      .replace(/[，,]/g, ",")
      .replace(/[（(]/g, "(").replace(/[）)]/g, ")")
      .replace(/rm/g, "").replace(/[％%]/g, "%")
      .replace(/。\.$/,"");
  }

  function show(id) {
    document.querySelectorAll(".screen").forEach((s) => s.classList.remove("active"));
    el(id).classList.add("active");
    window.scrollTo(0, 0);
  }

  /* ---------- HOME ---------- */
  function renderHome() {
    el("stat-level").textContent = levelFromXp(state.xp);
    el("stat-xp").textContent = state.xp;
    el("stat-streak").textContent = state.streak;
    el("stat-acc").textContent = state.totalAns ? Math.round((state.totalCorrect / state.totalAns) * 100) + "%" : "–";
    const intoLevel = state.xp % 100;
    el("xp-fill").style.width = intoLevel + "%";
    el("xp-hint").textContent = `距离下一级还差 ${100 - intoLevel} XP · 最佳连胜 ${state.bestStreak}`;
    el("foot-meta").textContent = `${BANK.meta.school} · 第 ${BANK.meta.builtIteration} 次迭代`;

    const grid = el("subject-grid");
    grid.innerHTML = "";
    Object.values(SUBJECTS).forEach((s) => {
      const total = s.questions.length;
      const done = s.questions.filter((q) => state.seen[q.id]).length;
      const pct = total ? Math.round((done / total) * 100) : 0;
      const card = document.createElement("button");
      card.className = "subject-card";
      card.style.background = `linear-gradient(150% 120% at 0 0, ${s.color}33, transparent), var(--card)`;
      card.innerHTML = `
        <span class="pill">${done}/${total}</span>
        <div class="ic">${s.icon}</div>
        <div class="nm">${s.name}</div>
        <div class="en">${s.enName}</div>
        <div class="bl">${s.blurb}</div>
        <div class="pbar"><i style="width:${pct}%;background:${s.color}"></i></div>`;
      card.onclick = () => openSubject(s.key);
      grid.appendChild(card);
    });
  }

  /* ---------- SUBJECT ---------- */
  function openSubject(key) {
    const s = SUBJECTS[key];
    el("subj-title").textContent = s.name;
    const head = el("subj-head");
    head.style.background = `linear-gradient(135deg, ${s.color}, ${s.color}aa)`;
    const done = s.questions.filter((q) => state.seen[q.id]).length;
    head.innerHTML = `<div class="big">${s.icon} ${s.name}</div><div class="sm">${s.enName} · ${s.blurb}<br/>题目 ${s.questions.length} 题 · 已练 ${done} 题</div>`;

    // topic breakdown
    const topics = {};
    s.questions.forEach((q) => { topics[q.topic] = (topics[q.topic] || 0) + 1; });
    el("topic-stats").innerHTML = Object.entries(topics)
      .map(([t, n]) => `<span class="t">${t} · ${n}</span>`).join("");

    // notes
    const nw = el("notes-wrap");
    nw.innerHTML = (s.notes || []).length ? `<h2 class="section-h" style="margin-left:0">温习笔记 · Study Notes</h2>` : "";
    (s.notes || []).forEach((n) => {
      const d = document.createElement("div");
      d.className = "note";
      d.innerHTML = `<h4>${n.title}</h4><p>${n.body}</p>`;
      nw.appendChild(d);
    });

    el("start-practice").onclick = () => startQuiz(shuffle(s.questions.map((q) => Object.assign({ _subj: key }, q))), s.name);
    show("screen-subject");
  }

  /* ---------- QUIZ ---------- */
  let quiz = null;
  function startQuiz(questions, label) {
    if (!questions.length) { alert("暂无可练习的题目。"); return; }
    quiz = { qs: questions.slice(0, 15), i: 0, correct: 0, label, xpGain: 0 };
    show("screen-quiz");
    renderQuestion();
  }

  function renderQuestion() {
    const q = quiz.qs[quiz.i];
    const subj = SUBJECTS[q._subj];
    el("q-total").textContent = quiz.qs.length;
    el("q-index").textContent = quiz.i + 1;
    el("qprogress-fill").style.width = ((quiz.i) / quiz.qs.length) * 100 + "%";
    const sc = el("q-subject"); sc.textContent = subj.icon + " " + subj.name; sc.style.background = subj.color + "44";
    el("q-topic").textContent = q.topic;
    el("q-stem").textContent = q.stem;
    el("q-feedback").hidden = true;
    el("q-next").hidden = true;

    const optsBox = el("q-options");
    const fillBox = el("q-fill");
    if (q.type === "fill") {
      optsBox.hidden = true; optsBox.innerHTML = "";
      fillBox.hidden = false;
      const inp = el("q-input"); inp.value = ""; inp.disabled = false;
      el("q-submit").disabled = false;
      el("q-submit").onclick = () => submitFill(q);
      inp.onkeydown = (e) => { if (e.key === "Enter") submitFill(q); };
      setTimeout(() => inp.focus(), 120);
    } else {
      fillBox.hidden = true;
      optsBox.hidden = false;
      optsBox.innerHTML = "";
      q.options.forEach((opt, idx) => {
        const b = document.createElement("button");
        b.className = "opt";
        b.innerHTML = `<span class="lt">${LETTERS[idx]}</span><span>${opt}</span>`;
        b.onclick = () => answerMcq(q, idx, b);
        optsBox.appendChild(b);
      });
    }
  }

  function answerMcq(q, idx, btn) {
    const correct = idx === q.answer;
    document.querySelectorAll("#q-options .opt").forEach((b, i) => {
      b.disabled = true;
      if (i === q.answer) b.classList.add("correct");
      else if (i === idx) b.classList.add("wrong");
      else b.classList.add("dim");
    });
    grade(q, correct, q.options[q.answer], LETTERS[q.answer]);
  }

  function submitFill(q) {
    const raw = el("q-input").value;
    if (!raw.trim()) { el("q-input").focus(); return; }
    const ok = q.answer.some((a) => normalize(a) === normalize(raw)) ||
               q.answer.some((a) => normalize(raw).includes(normalize(a)) && normalize(a).length > 1);
    el("q-input").disabled = true; el("q-submit").disabled = true;
    grade(q, ok, q.answer[0]);
  }

  function grade(q, correct, answerText, letter) {
    // record
    state.seen[q.id] = true;
    state.totalAns++;
    if (correct) {
      state.totalCorrect++; quiz.correct++;
      state.streak++; state.bestStreak = Math.max(state.bestStreak, state.streak);
      state.correct[q.id] = true; delete state.wrong[q.id];
      const gain = 10 + Math.min(state.streak, 10); // streak bonus
      state.xp += gain; quiz.xpGain += gain;
    } else {
      state.streak = 0; state.wrong[q.id] = true;
    }
    save();

    const fb = el("q-feedback");
    fb.hidden = false;
    fb.className = "q-feedback " + (correct ? "ok" : "bad");
    const head = correct ? "✅ 答对了！ Correct!" : "❌ 答错了 Not quite";
    const ansLine = correct ? "" :
      `<div>正确答案 · Answer：<span class="ans">${letter ? letter + ". " : ""}${answerText}</span></div>`;
    fb.innerHTML = `<div class="ftitle">${head}</div>${ansLine}<div style="margin-top:6px">${q.explanation}</div>`;
    if (correct) burst();

    const next = el("q-next");
    next.hidden = false;
    next.textContent = quiz.i + 1 < quiz.qs.length ? "下一题 ›" : "查看成绩 ›";
    next.onclick = () => { quiz.i++; quiz.i < quiz.qs.length ? renderQuestion() : finishQuiz(); };
  }

  function finishQuiz() {
    el("qprogress-fill").style.width = "100%";
    const total = quiz.qs.length, c = quiz.correct, pct = Math.round((c / total) * 100);
    el("result-correct").textContent = c;
    el("result-total").textContent = total;
    el("result-xp").textContent = `+${quiz.xpGain} XP　·　🔥 连胜 ${state.streak}`;
    let emoji, title, msg;
    if (pct === 100) { emoji = "🏆"; title = "满分！太厉害了！"; msg = "Perfect score! 你已经掌握了这一组题目，继续保持！"; }
    else if (pct >= 80) { emoji = "🎉"; title = "非常棒！"; msg = "Great job! 再复习一下错题就更稳了。"; }
    else if (pct >= 50) { emoji = "💪"; title = "继续加油！"; msg = "Keep going! 看看讲解，错题重练一次会进步很快。"; }
    else { emoji = "📚"; title = "别灰心，慢慢来"; msg = "Don't give up! 先读讲解再练一次，你一定可以的。"; }
    el("result-emoji").textContent = emoji;
    el("result-title").textContent = title;
    el("result-msg").textContent = msg;
    el("result-again").onclick = () => startQuiz(shuffle(quiz.qs), quiz.label);
    if (pct >= 80) burst(60);
    show("screen-result");
  }

  /* ---------- modes ---------- */
  function startMode(mode) {
    if (mode === "mixed") {
      startQuiz(shuffle(allQuestions()), "综合挑战");
    } else if (mode === "review") {
      const wrongIds = Object.keys(state.wrong);
      const qs = allQuestions().filter((q) => wrongIds.includes(q.id));
      if (!qs.length) { alert("太棒了，目前没有错题需要重练！🎉"); return; }
      startQuiz(shuffle(qs), "错题重练");
    }
  }

  /* ---------- confetti ---------- */
  function burst(n) {
    n = n || 18;
    const box = el("confetti");
    const colors = ["#ffd23f", "#e23d3d", "#34c77b", "#2e7d32", "#1565c0", "#ff6a3d"];
    for (let i = 0; i < n; i++) {
      const c = document.createElement("div");
      c.className = "cf";
      c.style.left = Math.random() * 100 + "vw";
      c.style.background = colors[(Math.random() * colors.length) | 0];
      c.style.animationDuration = 1.2 + Math.random() * 1.3 + "s";
      c.style.transform = `rotate(${Math.random() * 360}deg)`;
      box.appendChild(c);
      setTimeout(() => c.remove(), 2600);
    }
  }

  /* ---------- wire up ---------- */
  document.querySelectorAll("[data-home]").forEach((b) => (b.onclick = () => { renderHome(); show("screen-home"); }));
  document.querySelectorAll(".mode-card").forEach((b) => (b.onclick = () => startMode(b.dataset.mode)));
  el("quit-quiz").onclick = () => { if (confirm("退出本次练习？进度已保存。")) { renderHome(); show("screen-home"); } };

  renderHome();
})();

</script>
</body>
</html>
