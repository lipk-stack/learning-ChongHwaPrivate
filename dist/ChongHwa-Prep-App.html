<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />

<meta name="apple-mobile-web-app-title" content="中华备考" />
<title>中华独中 · 初一备考 ⭐ Star Quest</title>
<style>
:root{--bg:#0f1226;--bg2:#171a35;--card:#1e2245;--card2:#262b54;--ink:#f3f5ff;--muted:#a6acd6;--line:#2f3566;--brand:#e23d3d;--ok:#34c77b;--bad:#ff5d6c;--gold:#ffd23f;--blue:#4f8cff;--r:18px;--shadow:0 8px 28px rgba(0,0,0,.35)}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body,html{margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Roboto,Helvetica,Arial,sans-serif;background:linear-gradient(160deg,#0f1226,#141938 60%,#1a1330);color:var(--ink);min-height:100vh;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);overscroll-behavior-y:none}#app{max-width:720px;margin:0 auto;padding:14px 16px 48px}.screen{display:none;animation:fade .25s ease}.screen.active{display:block}@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}h2.section-h{font-size:15px;color:var(--muted);margin:22px 0 10px 2px;font-weight:700;letter-spacing:.3px}.hero{background:radial-gradient(120% 120% at 0 0,#e23d3d33,transparent),var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow)}.hero .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:19px}.hero .brand .logo{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;background:linear-gradient(135deg,#e23d3d,#ff7a59);font-size:20px}.hero .sub{color:var(--muted);font-size:12.5px;margin-top:4px}.starline{display:flex;align-items:center;gap:8px;margin-top:14px;flex-wrap:wrap}.starbig{font-size:30px;font-weight:900;color:var(--gold);display:flex;align-items:center;gap:6px}.starbig small{font-size:13px;color:var(--muted);font-weight:600}.stats{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}.stat{flex:1;min-width:74px;background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:10px;text-align:center}.stat b{display:block;font-size:18px}.stat span{font-size:11px;color:v ckground:var(--card2);color:var(--ink);border:1px solid var(--line)}.btn.gold{background:linear-gradient(135deg,var(--gold),#ff9d3d);color:#241a00}.topbar{display:flex;align-items:center;gap:10px;margin-bottom:10px}.topbar .back{background:var(--card2);border:1px solid var(--line);color:var(--ink);border-radius:12px;padding:8px 12px;font-weight:700;cursor:pointer}.topbar .title{font-weight:800;font-size:17px;flex:1}.topbar .chip{background:#0008;border:1px solid var(--line);border-radius:20px;padding:5px 11px;font-size:13px;font-weight:800;color:var(--gold)}.subj-head{border-radius:var(--r);padding:16px;color:#fff;box-shadow:var(--shadow)}.subj-head .big{font-size:22px;font-weight:900}.subj-head .sm{font-size:12.5px;opacity:.92;margin-top:6px;line-height:1.6}.topics{display:flex;flex-wrap:wrap;gap:7px;margin:14px 0}.topics .t{font-size:11.5px;background:var(--card2);border:1px solid var(--line);border-radius:20px;padding:5px 10px;color:var(--muted)}.note{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:10px}.note h4{margin:0 0 6px;font-size:14.5px}.note p{margin:0;font-size:13px;color:var(--muted);line-height:1.7}.qmeta{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:12.5px;color:var(--muted)}.qmeta .badge{border-radius:20px;padding:4px 10px;font-weight:700;color:#fff}.qprogress{height:8px;border-radius:6px;background:#0c0f22;overflow:hidden;border:1px solid var(--line);margin-bottom:14px}.qprogress i{display:block;height:100%;background:linear-gradient(90deg,var(--blue),#7ad);transition:width .3s}.qcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px 16px 18px;box-shadow:var(--shadow)}.qtopic{font-size:12px;color:var(--gold);font-weight:700}.qstem{font-size:18px;line-height:1.7;margin:8px 0 14px;white-space:pre-wrap}.opt{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:var(--card2);border:1.5px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:10px;color:var(--ink);font-size:15.5px;cursor:pointer;transition:.15s}.opt:hover{border-color:#5560b0}.opt .lt{width:28px;height:28px;flex:none;border-radius:9px;background:#0c0f22;border:1px solid var(--line);display:grid;place-items:center;font-weight:800;font-size:14px}.opt.correct{border-color:var(--ok);background:#19402f}.opt.correct .lt{background:var(--ok);color:#062}.opt.wrong{border-color:var(--bad);background:#3d1f27}.opt.wrong .lt{background:var(--bad);color:#400}.opt.dim{opacity:.5}.fillwrap{display:flex;gap:8px}.fillwrap input{flex:1;background:var(--card2);border:1.5px solid var(--line);border-radius:14px;padding:14px;color:var(--ink);font-size:17px;outline:0}.fillwrap input:focus{border-color:var(--blue)}.fillwrap button{flex:none;width:auto;padding:14px 18px}.feedback{margin-top:14px;border-radius:14px;padding:13px 14px;font-size:14px;line-height:1.7}.feedback.ok{background:#16361f;border:1px solid var(--ok)}.feedback.bad{background:#3a1a22;border:1px solid var(--bad)}.feedback .ftitle{font-weight:800;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}.feedback .delta{font-size:13px;font-weight:900}.feedback .ans{color:var(--gold);font-weight:800}.result{text-align:center;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:26px 18px;box-shadow:var(--shadow)}.result .emoji{font-size:58px}.result h2{margin:8px 0 4px;font-size:24px}.result .score{font-size:40px;font-weight:900;margin:10px 0}.result .score small{font-size:18px;color:var(--muted)}.result .meta{color:var(--gold);font-weight:800;margin:6px 0 18px}.result .msg{color:var(--muted);font-size:14px;line-height:1.7;margin-bottom:18px}.modal{position:fixed;inset:0;background:#000a;display:none;place-items:center;z-index:50;padding:18px}.modal.show{display:grid;animation:fade .2s}.modal .box{background:var(--card);border:1px solid var(--gold);border-radius:22px;padding:24px 20px;max-width:380px;width:100%;text-align:center;box-shadow:0 12px 50px #000}.modal .box .em{font-size:54px;animation:pop .5s}@keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.25)}100%{transform:scale(1)}}.modal .box h3{margin:8px 0;font-size:22px;color:var(--gold)}.modal .box p{color:var(--muted);font-size:14px;line-height:1.7;margin:0 0 18px}.modal .box .row{display:flex;gap:10px}.gamewrap{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px;box-shadow:var(--shadow);min-height:60vh}.gamehud{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-weight:800}.gamehud .timer{color:var(--gold)}.gamehud .sc{color:var(--ok)}.game-q{font-size:24px;font-weight:800;text-align:center;margin:18px 0;line-height:1.5;white-space:pre-wrap}.game-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px}.game-opts button{padding:18px;font-size:18px;font-weight:800;border-radius:14px;border:1.5px solid var(--line);background:var(--card2);color:var(--ink);cursor:pointer}.game-opts button.good{background:#19402f;border-color:var(--ok)}.game-opts button.bad{background:#3d1f27;border-color:var(--bad)}.intro{text-align:center;padding:14px 6px}.intro .ic{font-size:50px}.intro h3{margin:10px 0 6px;font-size:21px}.intro p{color:var(--muted);font-size:13.5px;line-height:1.7;margin:0 auto 18px;max-width:340px}.mem-grid{display:grid;gap:8px;margin-top:6px}.mem-card{aspect-ratio:1/1.15;border-radius:12px;border:1.5px solid var(--line);background:var(--card2);display:grid;place-items:center;text-align:center;padding:6px;font-size:13px;font-weight:700;cursor:pointer;color:transparent;transition:.15s}.mem-card.up{color:var(--ink);background:#26305c;border-color:#5560b0}.mem-card.done{color:var(--ok);background:#16361f;border-color:var(--ok);cursor:default}.mem-card .face{display:none}.mem-card.done .face,.mem-card.up .face{display:block}.catch-field{position:relative;height:48vh;min-height:300px;overflow:hidden;border-radius:14px;background:radial-gradient(120% 100% at 50% 0,#1b2150,#0c0f22);border:1px solid var(--line);margin-top:6px}.fstar{position:absolute;top:-50px;display:grid;place-items:center;width:64px;height:64px;border-radius:50%;font-weight:800;font-size:15px;cursor:pointer;color:#241a00;user-select:none}.scr-slots{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:14px 0;min-height:46px}.scr-tile{min-width:38px;height:46px;padding:0 8px;border-radius:10px;border:1.5px solid var(--line);background:var(--card2);display:grid;place-items:center;font-size:20px;font-weight:800;cursor:pointer}.scr-tile.placed{background:#26305c;border-color:#5560b0}.scr-hint{text-align:center;color:var(--muted);font-size:13px}.foot{text-align:center;color:var(--muted);font-size:11.5px;margin-top:26px;line-height:1.8}#confetti{position:fixed;inset:0;pointer-events:none;z-index:60;overflow:hidden}.cf{position:absolute;top:-10px;width:9px;height:14px;border-radius:2px;animation:fall linear forwards}@keyframes fall{to{transform:translateY(105vh) rotate(540deg);opacity:.9}}

</head>
<body>
<div id="app">
<!-- ===== HOME ===== -->
<section id="screen-home" class="screen active">
<div class="hero">
<div class="brand"><span class="logo">📚</span><span>中华独中 · 初一备考</span></div>
<div class="sub" id="hero-sub">Chong Hwa Junior-1 Entrance Exam · Star Quest</div>
<div class="starline">
<div class="starbig">⭐ <span id="stat-stars">0</span> <small id="stars-en">stars · 星星</small></div>
</div>
<div class="stats">
<div class="stat"><b id="stat-level">1</b><span>等级 Level</span></div>
<div class="stat"><b id="stat-streak">0</b><span>连胜 Streak</span></div>
<div class="stat"><b id="stat-acc">–</b><span>正确率 Accuracy</span></div>
<div class="stat"><b id="stat-life">0</b><span>累计星 Lifetime</span></div>
</div>
<div class="mstone">
<div class="top"><span>🎮 下一个小游戏 · Next mini-game</span><span id="ms-count"></span></div>
<div class="mbar"><i id="ms-fill" style="width:0%"></i></div>
<div class="hint" id="ms-hint"></div>
</div>
</div>
<h2 class="section-h">选择科目 · Choose a Subject</h2>
<div class="grid" id="subject-grid"></div>
<h2 class="section-h">挑战模式 · Challenge Modes</h2>
<div class="modes">
<button class="mode-card" data-mode="mixed"><div class="ic">🎯</div><div class="t">综合挑战</div><div class="d">Mixed quiz · 全科混合 15 题</div></button>
<button class="mode-card" data-mode="review"><div class="ic">🔁</div><div class="t">错题重练</div><div class="d">Review mistakes · 攻克错题</div></button>
</div>
<div class="foot" id="foot-meta"></div>
</section>
<!-- ===== SUBJECT ===== -->
<section id="screen-subject" class="screen">
<div class="topbar"><button class="back" data-home>‹ 返回</button><div class="title" id="subj-title"></div></div>
<div class="subj-head" id="subj-head"></div>
<div class="topics" id="topic-stats"></div>
<button class="btn primary" id="start-practice">开始练习 · Start Practice</button>
<div id="notes-wrap"></div>
</section>
<!-- ===== QUIZ ===== -->
<section id="screen-quiz" class="screen">
<div class="topbar"><button class="back" id="quit-quiz">‹ 退出</button>
<div class="title">第 <span id="q-index">1</span> / <span id="q-total">15</span> 题</div>
<div class="chip">⭐ <span id="q-stars">0</span></div></div>
<div class="qprogress"><i id="qprogress-fill" style="width:0%"></i></div>
<div class="qcard">
<div class="qmeta"><span class="badge" id="q-subject"></span><span id="q-topic" class="qtopic"></span></div>
<div class="qstem" id="q-stem"></div>
<div id="q-options"></div>
<div id="q-fill" class="fillwrap" hidden>
<input id="q-input" type="text" autocomplete="off" autocapitalize="off" placeholder="输入答案 · type your answer" />
<button class="btn primary" id="q-submit">确定</button>
</div>
<div id="q-feedback" class="feedback" hidden></div>
<button class="btn primary" id="q-next" hidden style="margin-top:14px">下一题 ›</button>
</div>
</section>
<!-- ===== RESULT ===== -->
<section id="screen-result" class="screen">
<div class="result">
<div class="emoji" id="result-emoji">🎉</div>
<h2 id="result-title"></h2>
<div class="score"><span id="result-correct">0</span><small>/<span id="result-total">0</span></small></div>
<div class="meta" id="result-stars"></div>
<div class="msg" id="result-msg"></div>
<button class="btn primary" id="result-again" style="margin-bottom:10px">再来一次 · Play Again</button>
<button class="btn ghost" data-home>回到主页 · Home</button>
</div>
</section>
<!-- ===== GAME ===== -->
<section id="screen-game" class="screen">
<div class="topbar"><button class="back" id="quit-game">‹ 退出</button>
<div class="title" id="game-title">小游戏</div>
<div class="chip" id="game-reward">⭐ 0</div></div>
<div class="gamewrap" id="game-host"></div>
</section>
</div>
<!-- milestone modal -->
<div class="modal" id="modal-ms">
<div class="box">
<div class="em" id="ms-em">🎁</div>
<h3 id="ms-tt"></h3>
<p id="ms-desc"></p>
<div class="row">
<button class="btn ghost" id="ms-later" style="flex:1">稍后</button>
<button class="btn gold" id="ms-play" style="flex:2">立即挑战 ▶</button>
</div>
</div>
</div>

<script>
window.QB={"meta":{"school":"吉隆坡中华独立中学 / Chong Hwa Independent High School, KL","exam":"初一新生考试 · Junior 1 Entrance Examination","paperYear":2026,"builtIteration":2},"subjects":{"chinese":{"k":"chinese","name":"华文","en":"Chinese","icon":"📖","color":"#e23d3d","blurb":"字词、成语、病句、修辞与文学常识","notes":[["现代文阅读 · 林海音《迟到》","2026 年现代文阅读选用林海音《迟到》。重点考查：① 字音字形（皱 zhòu、哀 āi）；② 用成语概括人物状态（被打后「狼狈不堪」）；③ 体会父亲「含蓄深沉」的爱；④ 概括人物习惯（养成「守时」的习惯）；⑤ 谈启示（父母严格管教背后是爱与关心，要学会理解与感恩）。答题技巧：概括题先找原文依据，再用自己的话归纳；启示题要联系全文主旨，言之成理即可。"],["作文 · 30 分","2026 题目（任选一题）：1.《难忘的运动会》 2.《那一刻，我学会了感恩》。要求用白话文写作，字数不少于 150。技巧：选真实经历，开头点题，中间通过一两个具体细节（动作、神态、心理）写出「那一刻」的感受，结尾升华情感。"]],"Q":[["字形辨析","取得好成绩时，我们应当保持 ____ 怀若谷的态度，继续努力，不可骄傲自满。",["须","许","虚","绪"],2,"成语是「虚怀若谷」，意思是胸怀像山谷一样宽广深邃，形容十分谦虚。「虚」表示谦虚、空，故选 C。「须」是必须，「许」是允许，「绪」是头绪，都不合此意。"],["字形辨析","在学习书法时，即使遇到许多 ____ 折，哲凯也依然每天坚持练习。",["挫","措","错","蹉"],0,"「挫折」指失败、受阻。「措」用于措施、不知所措；「错」是错误；「蹉」用于蹉跎（虚度光阴）。故选 A。"],["词语运用","作为队长，他深知比赛的重要性，所以赛前不敢有丝毫 ____，生怕掉以轻心而影响全队。",["粗心","松懈","傲慢","质疑"],1,"与「掉以轻心」呼应，强调不敢放松，「松懈」最贴切。故选 B。"],["成语·字形","当他看见母亲在站台上等候，脸上写满关切与思念，他不由得 ____ 泪下，紧紧抱住母亲。",["安然","昂首","盎然","潸然"],3,"「潸（shān）然泪下」形容眼泪不由自主地流下来，符合感动的情境。故选 D。「盎然」指兴味浓厚，「昂首」是抬头。"],["多音字","「他喜欢收藏邮票，就像考古学家寻找古代的宝藏一样。」句中两个「藏」的读音依序是：",["cáng；cáng","cáng；zàng","zàng；cáng","zàng；zàng"],1,"「收藏」的藏读 cáng（收存）；「宝藏」的藏读 zàng（蕴藏的财富）。依序为 cáng；zàng，故选 B。"],["多音字","下列哪一组画线字的读音是相同的？",["重：重量、重视、重新","行：行动、行李、银行","长：成长、长久、时长","倒：跌倒、倒闭、倒塌"],3,"D 组「跌倒、倒闭、倒塌」都读 dǎo，读音相同。A 的「重新」读 chóng；B 的「银行」读 háng；C 的「成长」读 zhǎng。故选 D。"],["成语运用","下列哪一项成语在句子中使用不恰当？",["看到同伴遇到困难，小丽总是挺身而出，乐于助人。","这本书情节扣人心弦，让人一读就停不下来。","在这个项目中，大家各执己见，提出建设性的意见。","经过不断努力，她的画技已达到出神入化的境界。"],2,"「各执己见」指各人坚持自己的意见、互不相让，带贬义，与「提出建设性的意见」的合作语境矛盾。故 C 使用不恰当。"],["成语·反义","「他明知前路充满风险，却毫不犹豫地站出来承担责任，展现出奋不顾身的精神。」下列哪项与「奋不顾身」意思相反？",["畏首畏尾","义无反顾","勇往直前","节节败退"],0,"「奋不顾身」形容勇往直前、不顾安危；其反义是「畏首畏尾」（瞻前顾后、胆小怕事）。B、C 是近义词，D 指接连失败。故选 A。"],["关联词","「____ 在学习上遇到困难，____ 在生活中受到打击，他都表现得很乐观。」",["如果……就","尽管……仍然","无论……还是","虽然……但是"],2,"前后是并列的两种情况，且结果不变，应用表示「条件无论怎样、结果都一样」的「无论……还是」。故选 C。"],["关联词","「他常年坚持环保公益活动，____ 风雨再大，____ 从未缺席。」",["只有……才","哪怕……也","不但……而且","与其……不如"],1,"表示退一步的假设让步关系：即使风雨再大也不缺席，应用「哪怕……也」。故选 B。"],["谚语","「老师不直接给答案，而是引导学生自己去探索、思考。」最能体现这种教育理念的谚语是：",["活到老，学到老","亡羊补牢，犹未为晚","工欲善其事，必先利其器","授人以鱼，不如授人以渔"],3,"「授人以鱼，不如授人以渔」强调教方法比直接给结果更重要，正与「引导学生自己探索」相合。故选 D。"],["歇后语","「他表面笑容可掬，背地里却处处陷害别人……这种人简直是 ____。」最适合填入的歇后语是：",["笑里藏刀——暗中伤人","八仙过海——各显神通","泥菩萨过河——自身难保","赶鸭子上架——勉为其难"],0,"句意是表里不一、暗中害人，「笑里藏刀——暗中伤人」最贴切。故选 A。"],["错别字","试选出「没有」错别字的一项：",["温顺 抱怨 迫不急待","辩论 恳求 一筹莫展","湛蓝 戒备 走头无路","粗造 默契 循规蹈矩"],1,"B 全对。A「迫不急待」应为「迫不及待」；C「走头无路」应为「走投无路」；D「粗造」应为「粗糙」。故选 B。"],["错别字","试选出「有」错别字的一项：",["冒险 胆大妄为 一无是处","羞涩 有条不紊 刻不容援","轻盈 唉声叹气 水滴石穿","艰辛 自作主张 满面春风"],1,"B 的「刻不容援」应为「刻不容缓」（缓：拖延）。其余各项均正确。故选 B。"],["近义词","下列哪一组词语的同义词搭配「不正确」？",["鼓励 = 激励","嘲笑 = 奚落","悠闲 = 安逸","犹豫 = 果断"],3,"「犹豫」是迟疑不决，「果断」是坚决不犹豫，二者意思相反，并非同义词。故选 D。"],["修辞手法","「小溪在欢快地歌唱，伴随着我一路前行，好像在为我加油打气。」这句采用了什么修辞手法？",["比喻","比拟","引用","夸张"],1,"把小溪当作人来写（会「歌唱」「加油打气」），这是把物当人写的「比拟（拟人）」。没有出现喻体相比，不是比喻。故选 B。"],["修辞手法","下列哪项修辞手法的判断「不正确」？",["这本书的内容多得可以装满操场。（夸张）","这点小事，难道还需要妈妈亲自帮你处理吗？（反问）","他实在太疲惫了，甚至连手指都懒得动一下。（比喻）","风呼呼地在窗外怒吼，把门窗吹得咯吱作响。（比拟）"],2,"C 句只是用「连手指都懒得动」来夸张地写疲惫，并没有比喻（没有把一物比作另一物），判断为「比喻」是错误的。故选 C。"],["句式","试选出「不是」祈使句的一项：",["你快把大门关上，以免冷风灌进来。","别忘了带上雨伞，外面快要下雨了！","我昨天在街上遇见好久不见的同学。","请安静下来，老师要宣布重要的事。"],2,"祈使句表示命令、请求、劝阻。C 只是陈述一件事（昨天遇见同学），是陈述句。故选 C。"],["病句","下列哪一个句子是「有」语病的？",["通过这次实地考察，使我增长了不少见识。","无论遇到多大困难，我们都要想办法解决。","新操场宽敞明亮，供同学们举办各类活动。","辩论赛中，双方辩手旗鼓相当，气氛热烈。"],0,"A 句「通过……使……」同时使用，使句子缺少主语（成分残缺）。应删去「通过」或「使」其中之一。故选 A。"],["病句","下列哪一个句子是「没有」语病的？",["这突如其来的暴雨，使积水的道路更加拥挤。","经过老师的帮助，他的缺点完全消失了很多。","学校的舞台剧表演赢得了观众们热烈的掌声。","全班同学纷纷积极报名参加环保社团的活动。"],2,"C 句结构完整、搭配恰当，没有语病。A「暴雨使道路更拥挤」搭配不当；B「完全消失了很多」自相矛盾；D「纷纷……积极」语义重复。故选 C。"],["文化常识","下列哪一项「不是」端午节的传统习俗？",["吃汤圆","赛龙舟","吃粽子","佩香囊"],0,"吃汤圆是元宵节（或冬至）的习俗。端午节的习俗有赛龙舟、吃粽子、佩香囊、挂艾草等。故选 A。"],["亲属称谓","下列哪一项亲属称谓配对「不正确」？",["表妹：称阿姨的女儿","姑妈：称父亲的姐妹","叔叔：称母亲的兄弟","堂哥：称大伯的儿子"],2,"「叔叔」是父亲的弟弟；母亲的兄弟应称「舅舅」。故 C 配对不正确。"],["文学常识","下列哪一部小说是曹雪芹的代表作？",["《西游记》","《红楼梦》","《水浒传》","《三国演义》"],1,"《红楼梦》是清代曹雪芹的代表作。《西游记》作者吴承恩，《水浒传》施耐庵，《三国演义》罗贯中。故选 B。"],["字形辨析","当今各国政府都在 ____ 制通货膨胀，以期度过金融危机。",["遏","竭","歇","揭"],0,"「遏制」指用力阻止、控制住，符合「控制通货膨胀」之意。「竭」是尽（竭尽），「歇」是休息，「揭」是揭开，都不合。故选 A。"],["字形辨析","有些商品越来越难 ____ 别真伪了。",["辩","辫","辨","瓣"],2,"「辨别」指分辨、区别真假。「辩」是辩论，「辫」是辫子，「瓣」是花瓣，皆不合。故选 C。"],["词语运用","新学期开始不久，大家慢慢地 ____ 起来，相处十分和睦。",["熟练","熟悉","熟习","熟睡"],1,"指人与人之间渐渐了解、亲近，用「熟悉」。「熟练」指技能纯熟，「熟习」指对学问技术掌握得好，「熟睡」是睡得香。故选 B。"],["多音字","「你和我相同，一样爱看相声表演。」句中两个「相」的读音依序是：",["xiàng；xiāng","xiāng；xiàng","xiāng；xiāng","xiàng；xiàng"],1,"「相同」的相读 xiāng（互相、彼此）；「相声」的相读 xiàng。依序为 xiāng；xiàng，故选 B。"],["文化常识","以下哪一个节庆是纪念爱国诗人屈原的？",["中秋节","端午节","中元节","元宵节"],1,"端午节相传是为纪念投江的爱国诗人屈原而设，习俗有赛龙舟、吃粽子。故选 B。"],["文学常识","下列哪一位「不是」儒家的代表人物？",["孔子","孟子","荀子","韩非子"],3,"韩非子是「法家」的代表人物。孔子、孟子、荀子皆为儒家代表。故选 D。"],["文学常识","「本是同根生，相煎何太急？」这句诗的作者是谁？",["曹操","曹丕","曹植","诸葛亮"],2,"此句出自曹植的《七步诗》，以萁豆相煎比喻兄弟相残。故选 C。"],["年龄称谓","明光的爷爷今年正值「古稀」之年。请问爷爷今年几岁？",["60 岁","70 岁","80 岁","90 岁"],1,"杜甫诗「人生七十古来稀」，「古稀」指七十岁。故选 B。"]]},"malay":{"k":"malay","name":"Bahasa Melayu","en":"Malay (国文)","icon":"🇲🇾","color":"#1565c0","blurb":"Pemahaman, tatabahasa, peribahasa & imbuhan","notes":[["Bahagian A — Karangan (30%)","2026: Tulis karangan bertajuk \"Kelebihan Tinggal di Bandar\" (≥100 patah perkataan) berdasarkan kata kunci: banyak kemudahan awam, institusi pendidikan, tempat percutian (monorel, hospital, universiti, taman tema air). Petua: satu isi satu perenggan, gunakan penanda wacana (selain itu, di samping itu, kesimpulannya) dan ayat majmuk."],["Bahagian B — Imbuhan (Pengimbuhan)","Jawapan rujukan 2026: 1. institusi 2. kecemasan 3. membazirkan 4. perancangan 5. harian; Pengimbuhan: 1. tergelincir 2. menguasai 3. ditangkap 4. susunan 5. keindahan. Kuasai imbuhan awalan (me-, di-, ter-, ber-), akhiran (-an, -kan, -i) dan apitan (ke-...-an, pe-...-an)."]],"Q":[["Pemahaman","Mengapakah Melaka dikenali sebagai \"Bandaraya Bersejarah\"?",["kerana terdapat banyak makanan tradisional","kerana ada persembahan kebudayaan","kerana kaya dengan warisan sejarah dan budaya","kerana ada banyak tempat pelancongan"],2,"Petikan menyatakan Melaka \"kaya dengan warisan sejarah dan budaya\", maka itulah sebab ia digelar Bandaraya Bersejarah. Jawapan C."],["Kosa kata","Maksud perkataan \"unik\" dalam petikan ialah ________.",["istimewa","mulia","unggul","cemerlang"],0,"\"Unik\" bermaksud lain daripada yang lain / istimewa. Jawapan A."],["Pemahaman","Di manakah tempat pelancongan yang menjadi tumpuan utama untuk membeli cenderamata, makanan tempatan dan melihat persembahan kebudayaan?",["Bukit St. Paul","Bangunan Stadthuys","Muzium Samudera","Jonker Street"],3,"Petikan menyebut \"Jonker Street ... menjadi tumpuan utama untuk membeli cenderamata, makanan tempatan dan melihat persembahan kebudayaan\". Jawapan D."],["Pemahaman (kecuali)","Apakah kelebihan melawat tempat bersejarah seperti Melaka, KECUALI ________.",["dapat menghargai warisan budaya","dapat menjimatkan wang ringgit","dapat mengenali sejarah negara","dapat menambah rasa cinta negara"],1,"Melawat tempat bersejarah tiada kaitan dengan menjimatkan wang ringgit; itu bukan kelebihan yang dinyatakan. Jawapan B."],["Pemahaman (kecuali)","Berikut ialah makanan tradisional negeri Melaka, KECUALI ________.",["sate","cendol","kuih keria","laksa Nyonya"],0,"Petikan menyenaraikan asam pedas, cendol, kuih keria dan laksa Nyonya. Sate tidak disebut sebagai makanan tradisional Melaka. Jawapan A."],["Kata ganti nama","Tuan Haji Azlan akan merasmikan pameran itu. ________ merupakan tokoh yang banyak terlibat dalam kerja amal.",["Dia","Anda","Beliau","Kamu"],2,"\"Beliau\" ialah kata ganti nama diri ketiga yang sopan, sesuai untuk orang yang dihormati seperti Tuan Haji. Jawapan C."],["Kata tanya","________ keadaan adik awak yang dirawat di hospital tempoh hari?",["Mengapakah","Apakah","Bagaimanakah","Bilakah"],2,"Bertanya tentang \"keadaan\" memerlukan kata tanya \"Bagaimanakah\". Jawapan C."],["Penjodoh bilangan","Pak Manan mempunyai dua ________ tanah yang ditanam dengan pokok getah.",["buah","batang","bidang","rawan"],2,"Penjodoh bilangan bagi tanah ialah \"bidang\" — sebidang/dua bidang tanah. Jawapan C."],["Kata sendi/hubung","Pelajar diberi masa selama satu jam ________ menulis karangan.",["untuk","oleh","demi","dengan"],0,"\"untuk\" menunjukkan tujuan — masa untuk menulis karangan. Jawapan A."],["Imbuhan","Komunikasi ________ Internet merupakan cara perhubungan terkini antara individu yang berada di tempat jauh.",["dilalui","berlalu","laluan","melalui"],3,"\"melalui\" bermaksud menggunakan/menerusi — komunikasi melalui Internet. Jawapan D."],["Kata kerja","Orang ramai ________ tangan sebaik sahaja pemidato itu selesai berucap.",["bertepuk","bersalam","berjabat","berlambai"],0,"Menyatakan penghargaan selepas ucapan ialah \"bertepuk tangan\". Jawapan A."],["Kata kerja","Ibu ________ sebiji pil ubat untuk melegakan sakit kepala.",["meneguk","memakan","menelan","menghisap"],2,"Pil ditelan bulat-bulat, jadi \"menelan\" paling tepat. Jawapan C."],["Kata sendi","Terdapat beberapa tompok dakwat hitam ________ baju John.",["di","dari","pada","daripada"],2,"\"pada\" digunakan untuk menyatakan tempat sesuatu melekat — pada baju. Jawapan C."],["Kata keterangan","Murid itu ditegur oleh guru disiplin kerana ________ lewat datang ke sekolah.",["sedang","selalu","sungguh","sentiasa"],1,"Konteks menunjukkan perbuatan berulang yang ditegur, maka \"selalu\" paling sesuai. Jawapan B."],["Kata seru","________, cantiknya bunga raya yang kamu tanam itu!",["Syabas","Wahai","Aduhai","Amboi"],3,"\"Amboi\" ialah kata seru yang menyatakan rasa kagum/hairan terhadap sesuatu yang cantik. Jawapan D."],["Kata bilangan","Bagi ________ orang, berniaga lebih baik daripada makan gaji.",["sebahagian","sesetengah","setiap","seluruh"],1,"\"sesetengah orang\" bermaksud sebilangan/sebahagian orang — pandangan tidak menyeluruh. Jawapan B."],["Kata ganda","Dewan sekolah itu menjadi ________ setelah lampu neon dipasang.",["gelap-gelita","terang-benderang","senyap-sunyi","riuh-rendah"],1,"Selepas lampu dipasang, dewan menjadi \"terang-benderang\" (sangat terang). Jawapan B."],["Kata sendi","Sepanjang perjalanan ke Ipoh, kami bercerita ________ pengalaman masing-masing.",["akan","pada","dengan","tentang"],3,"\"bercerita tentang\" sesuatu — tentang pengalaman. Jawapan D."],["Kata larangan","\"________ membuang sampah-sarap di merata-rata tempat,\" kata penghulu.",["Tolonglah","Haraplah","Janganlah","Usahlah"],2,"Ayat larangan yang sesuai ialah \"Janganlah membuang sampah\". Jawapan C."],["Kata nama","Para ________ yang memenuhi dewan itu terpukau oleh persembahan kebudayaan yang hebat itu.",["peminta","penonton","pengacara","pendengar"],1,"Persembahan ditonton, maka mereka ialah \"penonton\". Jawapan B."],["Imbuhan pra-","Kanak-kanak menerima pendidikan ________ sebelum masuk sekolah rendah.",["prasarana","prakata","prasyarat","prasekolah"],3,"Pendidikan sebelum sekolah rendah ialah \"prasekolah\" (tadika). Jawapan D."],["Pelbagai makna","Pilih ayat yang menggunakan perkataan \"mata\" dengan BETUL:\nI. Perempuan itu cantik tetapi mata duitan.\nII. Abang mengasah mata pisau itu sehingga tajam.\nIII. Menangkap ikan merupakan mata pencarian keluarganya.\nIV. Matanya menjadi merah kerana dimasuki habuk.",["I, III","II, IV","I, II, IV","I, II, III, IV"],3,"Keempat-empat ayat menggunakan \"mata\" dengan betul: mata duitan (tamak), mata pisau (bahagian tajam), mata pencarian (sumber rezeki), mata (anggota penglihatan). Jawapan D."],["Pelbagai makna","Pilih ayat yang menggunakan \"menjelaskan\" dengan BETUL:\nI. Faizah menjelaskan rancangan itu kepada rakan-rakannya.\nII. Penglihatan Razak amat menjelaskan sejak memakai cermin mata.\nIII. Ali menjelaskan segala hutang bapanya yang telah meninggal.\nIV. Emak menjelaskan barang-barang itu supaya nampak baharu.",["I, II","I, III","III, IV","II, III, IV"],1,"\"Menjelaskan\" bermaksud menerangkan (I) atau menyelesaikan/membayar (III – menjelaskan hutang). II dan IV salah penggunaan. Jawapan B."],["Peribahasa","Orang yang mengikut sahaja suruhan tanpa usul periksa diibaratkan seperti ________.",["seperti kerbau dicucuk hidung","seperti kera kena belacan","seperti katak kena sembur","seperti melukut di tepi gantang"],0,"\"Seperti kerbau dicucuk hidung\" bermaksud menurut sahaja perintah tanpa membantah/berfikir. Jawapan A."],["Peribahasa","Orang yang hanya bekerja apabila disuruh diibaratkan seperti ________.",["seperti kerbau dicucuk hidung","seperti menatang minyak yang penuh","seperti pahat dengan penukul","seperti katak di bawah tempurung"],2,"\"Seperti pahat dengan penukul\" — pahat hanya bergerak apabila diketuk penukul; menggambarkan orang yang hanya bekerja bila disuruh. Jawapan C."],["Imbuhan","Pelajar itu ________ buku-bukunya ke dalam beg sekolah sebelum pulang.",["memasuk","memasukkan","dimasukkan","kemasukan"],1,"Kata kerja transitif yang memerlukan objek ('buku') ialah 'memasukkan'. 'Dimasukkan' ialah bentuk pasif. Jawapan B."],["Penjodoh bilangan","Nenek membeli tiga ________ telur ayam di pasar pagi tadi.",["biji","buah","ekor","batang"],0,"Penjodoh bilangan bagi telur ialah 'biji' — tiga biji telur. Jawapan A."],["Peribahasa","Usaha yang dilakukan sedikit demi sedikit akhirnya membuahkan hasil yang besar. Peribahasa yang sesuai ialah ________.",["sedikit-sedikit, lama-lama menjadi bukit","seperti katak di bawah tempurung","bagai aur dengan tebing","melentur buluh biarlah dari rebungnya"],0,"'Sedikit-sedikit, lama-lama menjadi bukit' bermaksud sesuatu yang dilakukan sedikit demi sedikit akhirnya menjadi banyak. Jawapan A."],["Kata sendi nama","Setiap hari ayah pergi ke pejabat ________ menaiki keretapi.",["dengan","pada","untuk","akan"],0,"'dengan' menunjukkan cara atau alat — pergi dengan menaiki keretapi. Jawapan A."],["Antonim","Lawan kata (antonim) bagi perkataan 'rajin' ialah ________.",["malas","tekun","usaha","cekal"],0,"Lawan bagi 'rajin' ialah 'malas'. 'Tekun' dan 'cekal' pula seerti dengan rajin. Jawapan A."]]},"english":{"k":"english","name":"English","en":"English Language","icon":"🔤","color":"#2e7d32","blurb":"Reading, vocabulary, grammar, cloze & idioms","notes":[["Section A — Composition (20 marks)","2026: Choose ONE — (1) a picture-based story set at a cinema, using all the words: cinema, tickets, queue, broke into, pretended, annoyed, crowd, apologised, fault, embarrassed; or (2) a mind-map composition about your primary school (100–120 words). Plan: title → beginning (setting) → problem → climax → resolution/feeling."]],"Q":[["Reading","According to the passage, who held power in China during the Yuan Dynasty?",["The Mongol rulers","The Chinese rebels","The Japanese shoguns","The Han Chinese emperors"],0,"The passage states: \"During the Yuan Dynasty, China was ruled by the Mongols.\" Answer: A."],["Reading","Why were mooncakes chosen as the hiding place for secret messages?",["They were affordable and easy to bake.","They were only eaten by the rebels' families.","They were too small for the Mongols to inspect carefully.","They were commonly exchanged during the festival and did not attract attention."],3,"Because mooncakes were widely exchanged during the Mid-Autumn Festival, giving them did not look strange or arouse suspicion. Answer: D."],["Vocabulary in context","The word 'suspicion' in paragraph 4 can best be replaced by ________.",["joy","trust","doubt","relief"],2,"'Suspicion' means a feeling of doubt or mistrust; the closest word is 'doubt'. Answer: C."],["Inference","What does the story suggest about the role of unity in the rebels' success?",["Unity only mattered during the Mid-Autumn Festival.","Unity caused confusion since too many people joined.","Unity was not important because the Mongols were weak.","Unity allowed the rebels to rise together and that made their plan effective."],3,"The text says the rebels \"rose together\" and that \"with careful planning and unity, the rebellion succeeded.\" Answer: D."],["Main idea / Title","Which of the following is the most suitable title for the passage?",["The Secret of Mooncakes","Foods of the Yuan Dynasty","The Life of Mongol Soldiers","The History of Chinese Desserts"],0,"The whole passage centres on the hidden-message secret behind mooncakes, so \"The Secret of Mooncakes\" fits best. Answer: A."],["Vocabulary","She leaned over to ________ a secret to her best friend, making sure nobody else heard.",["murmur","whisper","stammer","exclaim"],1,"To say something very quietly so others can't hear is to 'whisper'. Answer: B."],["Word form","Eating ________ yogurt with colourful toppings made me feel delighted because every bite was sweet and creamy.",["freeze","froze","frozen","freezing"],2,"We need an adjective before the noun 'yogurt': 'frozen yogurt' (past participle used as adjective). Answer: C."],["Vocabulary","The ________ on the ground floor of the sports complex is large and busy with students waiting for their games.",["foyer","cloakroom","pantry","nursery room"],0,"A 'foyer' is a large entrance/waiting area, fitting a busy ground-floor space. Answer: A."],["Vocabulary","The grand concert hall was filled with excitement as the conductor gracefully led the talented ________ through a masterpiece.",["choral","orchestra","celebrity","accordion"],1,"A conductor leads an 'orchestra' (a large group of musicians). Answer: B."],["Word form","She inherited her grandmother's old diary and kept it with great care in her personal ________.",["possessive","possess","possessor","possession"],3,"After the adjective 'personal' we need a noun; 'possession' (a thing owned) fits. Answer: D."],["Vocabulary","The ________ dashed across the finish line with incredible speed, winning the gold medal.",["sprinter","shotputter","wrestler","ballerina"],0,"A runner who races at high speed across a finish line is a 'sprinter'. Answer: A."],["Vocabulary","She was reading a magazine when suddenly a/an ________ appeared, promoting exciting holiday packages to tropical islands.",["headline","report","poem","advert"],3,"Something that promotes/advertises holiday packages is an 'advert' (advertisement). Answer: D."],["Vocabulary","During our trip to New York, we were amazed by the towering ________, their glass walls reflecting sunlight.",["skyscrapers","cathedrals","cottages","mosques"],0,"Very tall buildings with glass walls in New York are 'skyscrapers'. Answer: A."],["Word form","The school choir's final ________ before the concert helped everyone feel more confident.",["rehearsal","rehearses","rehearsing","rehearsed"],0,"After 'final' we need a noun: 'rehearsal' (a practice session). Answer: A."],["Vocabulary","The ________ skilfully prepared my cappuccino with latte art while chatting with customers at the busy café.",["receptionist","entrepreneur","director","barista"],3,"A person who makes coffee in a café is a 'barista'. Answer: D."],["Tenses","He ________ his favourite cartoon when the electricity went off and the house became silent.",["watch","watched","have watched","was watching"],3,"A longer action interrupted by a sudden one uses the past continuous: 'was watching ... when the electricity went off'. Answer: D."],["Quantifiers","The professor reminded us that although ________ research has been conducted, climate change remains poorly understood.",["a lot of","many","few","several"],0,"'Research' is uncountable, so we use 'a lot of'. 'Many/few/several' need countable nouns. Answer: A."],["Word form","The blue dress looked absolutely ________ on her, especially with the shiny necklace.",["to stun","stunning","stunned","stun"],1,"After the linking verb 'looked' we need an adjective describing the dress: 'stunning' (very beautiful). 'Stunned' describes a person's feeling. Answer: B."],["Pronouns","The coach congratulated the players on ________ victory and reminded them to take care of ________ after the match.",["their, them","they, their","theirs, their","their, themselves"],3,"Possessive 'their victory'; reflexive 'take care of themselves' (the subject acts on itself). Answer: D."],["Conditionals","If the canteen ________ healthier meals, more students will choose them and improve their eating habits.",["offered","offer","offers","had offered"],2,"First conditional (real future): If + present simple, will + base verb. With 'the canteen' (singular) we use 'offers'. Answer: C."],["Superlatives","Of all the neighbours in our community, Aunt Mei is ________, always sharing food and kindness.",["friendlier","friendly","the friendliest","the most friendly"],2,"'Of all ...' signals the superlative. 'Friendly' takes -est: 'the friendliest'. Answer: C."],["Question tags","She always reads her favourite mystery novels late at night, ________?",["haven't they","does she","doesn't she","did she"],2,"A positive present-simple statement takes a negative tag with the matching auxiliary: 'doesn't she?'. Answer: C."],["Relative pronouns","The scientist ________ discovered the new plant explained it to the children in the school garden.",["who","which","whom","whose"],0,"The relative pronoun refers to a person and is the subject of the clause: 'who'. Answer: A."],["Articles","The architect suggested placing ________ L-shaped sofa in the living room, near ________ window facing the garden.",["an, a","the, the","a, the","an, the"],3,"'L-shaped' begins with a vowel sound /ɛl/, so 'an L-shaped sofa'; the specific window is 'the window'. Answer: D."],["Subject–verb agreement","Neither the manager nor the employees ________ how the new system works without detailed training.",["know","knows","known","knew"],0,"With 'neither...nor', the verb agrees with the nearer subject 'employees' (plural): 'know'. Answer: A."],["Cloze","At first I was reluctant to spend my school holidays ________ my grandparents' village.",["in","on","at","around"],2,"We use 'at' with a village/small place name as a point location: 'at my grandparents' village'. Answer: C."],["Cloze","The idea of leaving behind ________ friends, shopping malls and fast-paced city life made me feel frustrated.",["my","mine","their","ours"],0,"A possessive adjective before the noun 'friends' is needed, referring to the narrator: 'my'. Answer: A."],["Cloze","________, my perspective changed after I arrived.",["Otherwise","Therefore","Similarly","However"],3,"There is a contrast with the earlier reluctance, so 'However' is correct. Answer: D."],["Cloze","Each morning, I would ________ to the village market with my grandparents.",["walks","walk","walking","walked"],1,"After the modal 'would' we use the base verb: 'walk'. Answer: B."],["Cloze","The pleasant aroma of soups, ________ cooked pancakes, and dumplings made my mouth water.",["fresh","fresher","freshest","freshly"],3,"An adverb is needed to modify 'cooked': 'freshly cooked'. Answer: D."],["Cloze","Some vegetables looked unfamiliar, but tasting them was surprisingly ________.",["enjoyable","enjoying","enjoyably","enjoyment"],0,"After the linking verb 'was' we need an adjective: 'enjoyable'. Answer: A."],["Cloze","Villagers greeted me warmly, and I ________ see children playing safely along the streets.",["should","can","could","ought"],2,"The narrative is in the past, so the past-ability modal 'could' fits. Answer: C."],["Cloze","The mornings ________ cool and peaceful, and the fields glistened with dew.",["is","are","was","were"],3,"Subject 'mornings' is plural and the story is past tense: 'were'. Answer: D."],["Cloze","By the end of my stay, I felt a sense of ________ and peace I had never felt in the city.",["security","danger","confusion","fairness"],0,"Paired with 'peace' and a positive village experience, 'security' fits best. Answer: A."],["Cloze","I realised that slowing down and enjoying nature can be far ________ than the constant rush of urban life.",["more rewarding","most rewarding","rewarding","rewarded"],0,"'than' signals a comparative; the long adjective uses 'more': 'far more rewarding'. Answer: A."],["Idioms","Nina: Honestly, that's ________. The chairs are fine, and most students don't even notice. (about people being upset over new library chairs)",["no pain no gain","a storm in a teacup","a stitch in time saves nine","the early bird catches the worm"],1,"Making a big fuss over something trivial is 'a storm in a teacup'. Answer: B."],["Idioms","Nina: I think you're ________. It was the cleaner who locked up late, not Mr. Wong. (Alex blamed the wrong person)",["once bitten twice shy","a blessing in disguise","back to the drawing board","barking up the wrong tree"],3,"Blaming the wrong person/pursuing a mistaken idea is 'barking up the wrong tree'. Answer: D."],["Proverbs","Nina: That's smart — ________. You'll thank yourself later for preparing early. (studying hard before exams)",["jump on the bandwagon","put the cart before the horse","make hay while the sun shines","take the law into our own hands"],2,"Using a good opportunity while it lasts is 'make hay while the sun shines'. Answer: C."],["Phrasal verbs","Mia: Yesterday, my cousin and I ________ the science museum. (explored it)",["looked into","looked over","looked around","looked out for"],2,"To explore/tour a place is to 'look around' it. Answer: C."],["Phrasal verbs","Mia: We explored the space gallery, and I even ________ a model of a real rocket. (found it by chance)",["came by","came for","came apart","came across"],3,"To find something by chance is to 'come across' it. Answer: D."],["Tenses","By the time we reached the stadium, the match ________ already.",["had started","has started","started","starts"],0,"An action completed before another past action uses the past perfect: 'had started'. Answer: A."],["Prepositions","She is allergic ________ peanuts, so she always reads the food labels carefully.",["to","with","from","of"],0,"The fixed expression is 'allergic to' something. Answer: A."],["Vocabulary","The detective examined every ________ carefully before solving the mysterious case.",["clue","cue","queue","crew"],0,"A piece of evidence that helps solve a mystery is a 'clue'. A 'cue' is a signal, a 'queue' is a line, a 'crew' is a team. Answer: A."],["Word form","His ________ to finish the marathon, despite the injury, inspired everyone watching.",["determine","determined","determination","determinedly"],2,"After the possessive 'His' we need a noun: 'determination'. Answer: C."],["Subject–verb agreement","The list of ingredients ________ printed clearly on the back of the packet.",["is","are","were","have"],0,"The subject is the singular noun 'list' (not 'ingredients'), so the verb is 'is'. Answer: A."],["Vocabulary","Learning a new language can be challenging at first, but with daily practice it becomes ________.",["easier","easiest","more easy","easy more"],0,"A comparative is needed to show change over time: 'easier'. Answer: A."]]},"math":{"k":"math","name":"数学","en":"Mathematics","icon":"🔢","color":"#f57f17","blurb":"百分比、比例、平均、利息、行程与逻辑推理","notes":[["作答须知","2026 数学卷共 30 题：甲组 20 题（每题 3.5 分），乙组 10 题（每题 3 分），全部填空作答。常考点：四则混合运算、分数小数互化、百分比与盈亏、比例分配、平均数、单利、行程问题，以及抽屉原理、找规律、计数等逻辑题。本题库收录可清晰还原的题目并附完整解题步骤。"],["找规律例题（第 25 题）","已知 3＊4 → 12,7,5；8＊5 → 40,13,27；6＊9 → 54,15,39。规律：a＊b 得「a×b、a+b、(a×b)−(a+b)」。所以 9＊8 → 72、17、55（答案取 55）。"]],"Q":[["百分比","计算 150 的 53% 与 30 的 15% 的差。",0,["75"],"150 × 53% = 79.5；30 × 15% = 4.5；差 = 79.5 − 4.5 = 75。"],["数的表示","将 5¼（即 21/4）百万写成整数。",0,["5250000","5 250 000"],"5¼ 百万 = 5.25 × 1 000 000 = 5 250 000。"],["分数","将 0.132 化为最简分数。",0,["33/250"],"0.132 = 132/1000；分子分母同除以 4，得 33/250（已最简）。"],["质数","写出 30 与 39 之间的所有质数。",0,["31,37","31, 37","31 37","37,31"],"31 与 37 只能被 1 和本身整除，是质数；其余 32~38 皆为合数。答案：31, 37。"],["面积","长方形长 9cm、宽 6cm，其面积等于一个高为 12cm 的三角形面积。求三角形的底（cm）。",0,["9"],"长方形面积 = 9×6 = 54cm²。三角形面积 = ½×底×高 = ½×底×12 = 6×底 = 54，故底 = 9cm。"],["比例","铁片与铜片的重量比为 15:8。若铁片重 1.2 公斤，求铜片的重量（克）。",0,["640"],"每份 = 1.2 ÷ 15 = 0.08 公斤；铜片 = 0.08 × 8 = 0.64 公斤 = 640 克。"],["平均数","5 个数的平均是 6。其中四个为 7、3.5、4.2、6.4，求第五个数。",0,["8.9"],"五数之和 = 6×5 = 30；已知四数之和 = 7+3.5+4.2+6.4 = 21.1；第五数 = 30 − 21.1 = 8.9。"],["盈亏·成本","一匹布若卖 RM520 则亏 20%。若想赚 20%，应卖多少钱（RM）？",0,["780"],"成本 = 520 ÷ (1−20%) = 520 ÷ 0.8 = RM650；赚 20% 售价 = 650 × 1.2 = RM780。"],["最小公倍数","三兄弟分别每 2、4、8 天回家一次。2025 年 2 月 22 日一起在家，下次同时在家是哪一天？",0,["3月2日","2025年3月2日","3/2","2025-3-2"],"2、4、8 的最小公倍数 = 8，即 8 天后再相遇。2025 年 2 月有 28 天，22 日 + 8 天 = 3 月 2 日。"],["单利","存入 RM5000，年利率 3.6%，单利计算 2 年后户口共有多少钱（RM）？",0,["5360","5360.00"],"利息 = 5000 × 3.6% × 2 = RM360；本利和 = 5000 + 360 = RM5360。"],["行程","驾车 3 小时 30 分钟行驶 301 公里。求平均速度（公里/小时）。",0,["86"],"3 小时 30 分 = 3.5 小时；速度 = 301 ÷ 3.5 = 86 公里/小时。"],["百分比","罐中先放 3 红 1 白，再放 4 红 6 白。此时红球占总数的百分之几？",0,["50%","50"],"红 = 3+4 = 7，白 = 1+6 = 7，总数 = 14；红球占 7/14 = 50%。"],["分数应用","压岁钱 RM160，先用 ¼ 买漫画，再用剩余的 ⅖ 买颜料。还剩多少钱（RM）？",0,["72","72.00"],"买漫画 = 160 × ¼ = 40，剩 120；买颜料 = 120 × ⅖ = 48，剩 = 120 − 48 = RM72。"],["连续奇数","三个连续奇数的和是 63，求最小的奇数。",0,["19"],"中间数 = 63 ÷ 3 = 21；三数为 19、21、23，最小是 19。"],["一元方程","某数的 5 倍减去 200 后得 100，求此数。",0,["60"],"设此数为 x：5x − 200 = 100 → 5x = 300 → x = 60。"],["百分比增长","第一天卖 240 粒榴莲，第二天比第一天多 30%。两天共卖多少粒？",0,["552"],"第二天 = 240 × 1.3 = 312；两天合计 = 240 + 312 = 552 粒。"],["单位换算","将 2 公升的油平均装进 8 个瓶子，每瓶可装多少毫升？",0,["250"],"2 公升 = 2000 毫升；2000 ÷ 8 = 250 毫升。"],["平均数·逻辑","某班数学平均 62.3 分。小智的分数应为 96 而非 69，重算后平均为 63.2 分。这班有多少人？",0,["30"],"总分增加 96 − 69 = 27 分；平均上升 63.2 − 62.3 = 0.9 分；人数 = 27 ÷ 0.9 = 30 人。"],["倍增·逆推","树苗每天长高一倍，10 天长到 20 厘米。当它长到 0.625 厘米时，已经过了多少天？",0,["5"],"从 0.625 翻倍到 20：20 ÷ 0.625 = 32 = 2⁵，需 5 天；故在第 10 − 5 = 第 5 天达到 0.625 厘米。"],["分数·方程","A、B 两队共 160 人。若 A 的 ⅖ 转到 B、B 的 ⅓ 转到 A 后两队人数相同。A 队原有多少人？",0,["100"],"转换后两队各 80 人。设 A 原有 a：a − ⅖a + ⅓(160−a) = 80。化简（×15）：9a + 800 − 5a = 1200 → 4a = 400 → a = 100。"],["分数·分配","四人合资 RM1230。丙付丁的 ½，乙付丙的 ⅓，甲付乙的 ¼。丁付了多少钱（RM）？",0,["720","720.00"],"设丁 = d，则丙 = d/2，乙 = d/6，甲 = d/24；合计 = d(1+½+⅙+1/24) = 41d/24 = 1230 → d = RM720。"],["利润·逻辑","每售一本获利 RM8。降价后销量增加一倍，总利润增加 0.5 倍。每本降价多少钱（RM）？",0,["2","2.00"],"设原售 1 本，总利润 8；降价 x 后每本利润 (8−x)，销量 2 本，总利润 = 2(8−x) = 8×1.5 = 12 → 8−x = 6 → x = RM2。"],["抽屉原理","红球 4、白球 5、黑球 6。黑暗中至少取出多少粒，才能保证有 4 粒同色？",0,["10"],"最坏情况每色各取 3 粒（共 9 粒）仍无 4 粒同色；再取 1 粒必定凑成 4 粒同色，故至少取 10 粒。"],["排列·计数","五天每天只做华/数/英一科，相邻两天不同科；第一天做华文、第五天也做华文。三科共有多少种安排？",0,["6"],"第 1、5 天固定为华文。第 2 天有 2 选（数/英），逐天讨论第 3、4 天（相邻不同、第 4 天≠华文），共得 6 种。"],["质数","计算 10 至 25 之间所有质数的和。",0,["83"],"10~25 之间的质数有 11、13、17、19、23，其和 = 11+13+17+19+23 = 83。"],["单位换算","计算 9 km 628 m + 1.5 km，答案以 m（米）表示。",0,["11128"],"9 km 628 m = 9628 m；1.5 km = 1500 m；合计 = 9628 + 1500 = 11128 m。"],["近似值","将 1530849 四舍五入到「百位」，写出近似值。",0,["1530800"],"看十位上的数字 4（<5）舍去，百位不变，得 1530800。"],["分数化小数","把 64/125 化为小数。",0,["0.512"],"分母 125 × 8 = 1000，分子 64 × 8 = 512，故 64/125 = 512/1000 = 0.512。"],["百分比","3.2 公斤的 4% 是多少克？",0,["128"],"3.2 公斤 = 3200 克；3200 × 4% = 128 克。"],["百分比·回扣","一台电视机原价 RM1250，会员可获 15% 回扣。陈先生是会员，他可回扣多少钱（RM）？",0,["187.5","187.50"],"回扣 = 1250 × 15% = RM187.50。"],["逆推","凯莉用零用钱的 20% 买一支笔，再用 RM6 买两本练习簿，最后剩下 RM2。她原来的零用钱是多少（RM）？",0,["10","10.00"],"买笔后剩 80%。设原有 x：0.8x − 6 = 2 → 0.8x = 8 → x = RM10。"],["面积与周长","一个长 12cm、宽 6cm 的长方形，其面积（数值）刚好等于一个正方形的周长（数值）。求正方形的边长（cm）。",0,["18"],"长方形面积 = 12 × 6 = 72；正方形周长 = 72，故边长 = 72 ÷ 4 = 18 cm。"],["比例·平均","两袋沙包的重量比为 5:6，较重的一袋重 42kg。求两袋的平均重量（kg）。",0,["38.5"],"每份 = 42 ÷ 6 = 7kg；较轻一袋 = 7 × 5 = 35kg；平均 = (42 + 35) ÷ 2 = 38.5kg。"],["比例","2.5kg 的物品卖 RM101.25。购买相同物品 1.5kg 需多少令吉（RM）？",0,["60.75"],"每公斤 = 101.25 ÷ 2.5 = RM40.50；1.5kg = 40.50 × 1.5 = RM60.75。"],["面积","一个底为 12cm 的三角形，面积是 30cm²。求它的高（cm）。",0,["5"],"三角形面积 = ½ × 底 × 高 → 30 = ½ × 12 × 高 = 6 × 高，故高 = 5cm。"],["年龄","小胖今年 12 岁，妈妈的年龄是小胖的 4 倍多 5 岁。妈妈今年几岁？",0,["53"],"妈妈 = 12 × 4 + 5 = 48 + 5 = 53 岁。"],["单利","向银行贷款 RM50000，以单利计算，年利率 6%。5 年后的利息是多少令吉（RM）？",0,["15000"],"利息 = 本金 × 利率 × 年数 = 50000 × 6% × 5 = RM15000。"],["比·逻辑","农场里鸡和羊共 2100 只，其中鸡有 1500 只。鸡的脚和羊的脚的数量比是多少？（以最简比表示）",0,["5:4","5：4"],"羊 = 2100 − 1500 = 600 只；鸡脚 = 1500 × 2 = 3000，羊脚 = 600 × 4 = 2400；比 = 3000:2400 = 5:4。"],["促销·计数","一支红笔 RM2，文具店促销「买 5 送 1」。用 RM50 最多可得多少支红笔？",0,["30"],"RM50 可买 50 ÷ 2 = 25 支；每买 5 支送 1 支，25 ÷ 5 = 5 支赠品；合计 25 + 5 = 30 支。"],["找规律","已知 8＊3=55、7＊3=40、5＊2=21、4＊2=12。若 A＊6=45 且 A>0，求 A。",0,["9"],"规律为 a＊b = a² − b²（如 8²−3²=55）。A² − 6² = 45 → A² = 81 → A = 9。"]]}}};
